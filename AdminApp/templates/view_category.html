<!DOCTYPE html>
{% extends "dashboard.html" %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div class="row">
          <div class="col-12">
            <div class="card card-primary">
              <div class="card-header">
                <h3 class="card-title">View Category</h3>

                <div class="card-tools">
                  <div class="input-group input-group-sm" style="width: 150px;">
                    <input type="text" name="table_search" class="form-control float-right" placeholder="Search">

                    <div class="input-group-append">
                      <button type="submit" class="btn btn-default">
                        <i class="fas fa-search"></i>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
              <!-- /.card-header -->
              <div class="card-body table-responsive p-0">
                <table class="table table-hover text-nowrap">
                  <thead>
                    <tr>
                      <th>Category Name</th>
                      <th>Description</th>
                      <th>Category Image</th>
                      <th>Action</th>

                    </tr>
                  </thead>
                  <tbody>
                  {% for c in categories %}
                    <tr>
                      <td>{{c.CategoryName}}</td>
                      <td
                                data-toggle="tooltip"
                                data-html="true"
                                data-placement="top"
                                title="{{ c.Description|linebreaksbr }}"
                        >
                            {{ c.Description|truncatewords:10 }}
                        </td>

                      <td>
                          {% if c.CategoryImage %}
                            <img src="{{ c.CategoryImage.url }}" width="100">
                            {% endif %}
                      </td>
                      <td>
                           <a href="{% url 'edit_category' category_id=c.id %}" class="btn btn-outline-primary">Edit</a>
                             <a href="{% url 'delete_category' category_id=c.id %}" class="btn btn-outline-danger" onclick="return confirm('Are you sure?')">
                                      Delete</a>

                      </td>

                    </tr>
                  {% endfor %}

                  </tbody>
                </table>
              </div>
              <!-- /.card-body -->
            </div>
            <!-- /.card -->
          </div>
        </div>
</body>
</html>
{% endblock %}
