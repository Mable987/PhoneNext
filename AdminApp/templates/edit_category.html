<!DOCTYPE html>
{% extends 'dashboard.html' %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div class="card card-primary">
    <div class="card-header">
        <h3 class="card-title">Add Categories</h3>
    </div>
    <!-- /.card-header -->
    <!-- form start -->
    <form method="post" action="{% url 'update_category' category_id=data.id %}" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="card-body">
            <div class="form-group">
                <label for="exampleInput1">Category Name</label>
                <input type="text" class="form-control" id="exampleInput1" placeholder="Category Name"
                       name="categoryname" value="{{data.CategoryName}}">
            </div>
            <div class="form-group">
                <label for="exampleTextarea1">Description</label>
                <textarea class="form-control" id="exampleTextarea1" rows="4"
                          name="description">{{data.Description}}</textarea>
            </div>
            <div class="form-group">
                <label>Category Image</label>

                {% if data.CategoryImage %}
                <br>
                <img src="{{ data.CategoryImage.url }}" width="120" class="mb-2">
                {% endif %}

                <div class="custom-file">
                    <input type="file" class="custom-file-input" name="categoryimage">
                    <label class="custom-file-label">Choose new image</label>
                </div>
            </div>


        </div>
        <!-- /.card-body -->

        <div class="card-footer">
            <button type="submit" class="btn btn-primary" fdprocessedid="6w4ajj">Submit</button>
        </div>
    </form>
</div>
</body>
</html>
{% endblock %}
